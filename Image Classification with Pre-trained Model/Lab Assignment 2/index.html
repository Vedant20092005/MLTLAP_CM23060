<!DOCTYPE html>
<html>
<head>
<title>Pro Model Comparison</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
font-family:'Inter',sans-serif;
background:#0f172a;
margin:0;
color:#e2e8f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:850px;
background:#111827;
padding:25px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.05);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h2{
margin:0;
font-weight:600;
}

.header p{
margin:5px 0;
opacity:0.6;
font-size:13px;
}

.upload-area{
text-align:center;
padding:15px;
border:2px dashed rgba(255,255,255,0.2);
border-radius:15px;
background:#020617;
cursor:pointer;
}

.upload-area:hover{
background:rgba(56,189,248,0.08);
}

#preview{
max-width:280px;
margin-top:15px;
border-radius:10px;
display:none;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#38bdf8;
color:#020617;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.results{
display:flex;
gap:20px;
margin-top:20px;
}

.box{
flex:1;
background:#020617;
padding:15px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
}

.box h3{
margin-top:0;
font-size:16px;
}

.prediction{
margin-top:10px;
}

.row{
display:flex;
justify-content:space-between;
font-size:13px;
}

.bar{
height:6px;
background:#1e293b;
border-radius:5px;
margin-top:5px;
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,#38bdf8,#22c55e);
}

.loader{
border:3px solid rgba(255,255,255,0.1);
border-top:3px solid #38bdf8;
border-radius:50%;
width:20px;
height:20px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);} 
100%{transform:rotate(360deg);} 
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>🧠 Model Comparison Dashboard</h2>
<p>MobileNet V1 vs MobileNet V2</p>
</div>

<div class="upload-area" onclick="document.getElementById('upload').click()">
<p>Click or Upload Image</p>
<input type="file" id="upload" hidden>
<img id="preview">
</div>

<div style="text-align:center">
<button onclick="classify()">Run Classification</button>
</div>

<div class="results">

<div class="box">
<h3>MobileNet V1</h3>
<div id="model1"><div class="loader"></div></div>
</div>

<div class="box">
<h3>MobileNet V2</h3>
<div id="model2"><div class="loader"></div></div>
</div>

</div>

</div>

<script>

let model1;
let model2;

async function loadModels(){

model1 = await mobilenet.load({version:1, alpha:1.0});
document.getElementById("model1").innerHTML="✅ Ready";

model2 = await mobilenet.load({version:2, alpha:1.0});
document.getElementById("model2").innerHTML="✅ Ready";

}

const upload=document.getElementById("upload");
const preview=document.getElementById("preview");

upload.addEventListener("change",function(){

const file=this.files[0];
const reader=new FileReader();

reader.onload=function(e){
preview.style.display="block";
preview.src=e.target.result;
}

reader.readAsDataURL(file);

});

async function classify(){

const img=document.getElementById("preview");

if(!model1 || !model2){
alert("Models are still loading...");
return;
}

const pred1=await model1.classify(img);
const pred2=await model2.classify(img);

function format(pred){
let html="";
for(let i=0;i<3;i++){
const conf=(pred[i].probability*100).toFixed(1);
html+=`
<div class="prediction">
<div class="row">
<span>${pred[i].className}</span>
<span>${conf}%</span>
</div>
<div class="bar">
<div class="fill" style="width:${conf}%"></div>
</div>
</div>`;
}
return html;
}

document.getElementById("model1").innerHTML=format(pred1);
document.getElementById("model2").innerHTML=format(pred2);

}

loadModels();

</script>

</body>
</html>
