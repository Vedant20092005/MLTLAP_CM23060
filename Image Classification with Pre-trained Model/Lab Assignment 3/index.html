<!DOCTYPE html>
<html>
<head>
<title>AI Image Classifier</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:15px;
width:800px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

h1{
margin-bottom:10px;
}

.upload-box{
border:2px dashed rgba(255,255,255,0.5);
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
background:rgba(255,255,255,0.1);
}

img{
max-width:250px;
margin-top:15px;
border-radius:10px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#00c6ff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0072ff;
}

.results{
display:flex;
gap:20px;
margin-top:25px;
}

.card{
flex:1;
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:10px;
text-align:left;
}

.bar{
height:8px;
background:#ddd;
border-radius:5px;
margin-top:5px;
overflow:hidden;
}

.fill{
height:100%;
background:#00ffcc;
}

.loading{
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 AI Image Classifier</h1>
<p>Compare MobileNet V1 vs V2</p>

<div class="upload-box" onclick="fileInput.click()">
📁 Click or Drag Image Here
<input type="file" id="upload" hidden>
</div>

<img id="preview">

<br>

<button onclick="classify()">🚀 Classify Image</button>

<div class="results">

<div class="card">
<h3>MobileNet V1</h3>
<div id="model1" class="loading">Loading model...</div>
</div>

<div class="card">
<h3>MobileNet V2</h3>
<div id="model2" class="loading">Loading model...</div>
</div>

</div>

</div>

<script>

let model1, model2;

async function loadModels(){
model1 = await mobilenet.load({version:1, alpha:1.0});
document.getElementById("model1").innerHTML="✅ Ready";

model2 = await mobilenet.load({version:2, alpha:1.0});
document.getElementById("model2").innerHTML="✅ Ready";
}

const fileInput = document.getElementById("upload");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", function(){
const file = this.files[0];
if(file){
preview.src = URL.createObjectURL(file);
}
});

function createResultHTML(predictions){
let html = "";

predictions.slice(0,3).forEach((p,i)=>{
let percent = (p.probability*100).toFixed(2);

html += `
<div>
<b>${i+1}. ${p.className}</b> (${percent}%)
<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>
</div><br>
`;
});

return html;
}

async function classify(){

const img = document.getElementById("preview");

if(!img.src){
alert("Please upload image first!");
return;
}

if(!model1 || !model2){
alert("Models loading...");
return;
}

document.getElementById("model1").innerHTML="⏳ Predicting...";
document.getElementById("model2").innerHTML="⏳ Predicting...";

const pred1 = await model1.classify(img);
const pred2 = await model2.classify(img);

document.getElementById("model1").innerHTML = createResultHTML(pred1);
document.getElementById("model2").innerHTML = createResultHTML(pred2);
}

loadModels();

</script>

</body>
</html>
