<!DOCTYPE html>
<html>
<head>
  <title>AI Product Search System</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    input {
      width: 50%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px auto;
      width: 60%;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h1>🛒 AI Product Search System</h1>

<input type="text" id="query" placeholder="Search product (e.g. laptop under 50000)">
<button onclick="search()">Search</button>

<div id="results"></div>

<script>
async function search() {
  const query = document.getElementById("query").value;

  const res = await fetch("http://localhost:3000/search", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ query })
  });

  const data = await res.json();

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  data.results.forEach(p => {
    resultsDiv.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>Price: ₹${p.price}</p>
        <p>Score: ${p.score}</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
