```html
<!DOCTYPE html>
<html>
<head>
<title>MobileNet Overlay Classification</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#eef2f7;
margin:0;
}

h2{
margin-top:20px;
}

.container{
position:relative;
display:inline-block;
}

video{
border:3px solid #333;
border-radius:10px;
}

canvas{
position:absolute;
top:0;
left:0;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:16px;
background:#ff9800;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>MobileNet Webcam Classification (Overlay)</h2>

<button onclick="toggle()">Pause / Resume</button>

<div class="container">

<video id="webcam" width="640" height="480" autoplay muted></video>

<canvas id="overlay" width="640" height="480"></canvas>

</div>

<canvas id="input" width="224" height="224" style="display:none;"></canvas>

<script>

let model;
let detecting=true;

async function setupCamera(){

const video=document.getElementById("webcam");

const stream=await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject=stream;

return new Promise(resolve=>{
video.onloadedmetadata=()=>resolve(video);
});

}

async function loadModel(){

model=await mobilenet.load();
console.log("MobileNet Loaded");

}

function toggle(){
detecting=!detecting;
}

async function predict(video){

const inputCanvas=document.getElementById("input");
const ctx=inputCanvas.getContext("2d");

ctx.drawImage(video,0,0,224,224);

const predictions=await model.classify(inputCanvas);

const best=predictions[0];

const canvas=document.getElementById("overlay");
const overlay=canvas.getContext("2d");

overlay.clearRect(0,0,canvas.width,canvas.height);

overlay.fillStyle="rgba(0,0,0,0.6)";
overlay.fillRect(10,10,350,50);

overlay.fillStyle="white";
overlay.font="20px Arial";

overlay.fillText(
best.className+" : "+(best.probability*100).toFixed(1)+"%",
20,
40
);

if(detecting){
setTimeout(()=>predict(video),500);
}

}

async function main(){

const video=await setupCamera();
await loadModel();

predict(video);

}

main();

</script>

</body>
</html>
```
